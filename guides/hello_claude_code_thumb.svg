<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <rect width="800" height="500" fill="#faf7f2"/>

  <!-- Subtle grid lines -->
  <g stroke="#ddd8ce" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- Terminal window -->
  <rect x="60" y="60" width="420" height="330" rx="4" fill="#1a1714"/>

  <!-- Terminal title bar -->
  <rect x="60" y="60" width="420" height="36" rx="4" fill="#2a2420"/>
  <rect x="60" y="80" width="420" height="16" fill="#2a2420"/>

  <!-- Traffic light dots -->
  <circle cx="84" cy="78" r="7" fill="#b85c38"/>
  <circle cx="108" cy="78" r="7" fill="#c8a96e"/>
  <circle cx="132" cy="78" r="7" fill="#5a6b5d"/>

  <!-- Terminal label -->
  <text x="250" y="83" font-family="monospace" font-size="11" fill="#8a8078" text-anchor="middle" letter-spacing="2">TERMINAL</text>

  <!-- Code lines inside terminal -->
  <!-- Prompt line -->
  <text x="84" y="124" font-family="monospace" font-size="13" fill="#b85c38">$</text>
  <text x="98" y="124" font-family="monospace" font-size="13" fill="#faf7f2"> claude</text>

  <!-- Claude Code output -->
  <text x="84" y="148" font-family="monospace" font-size="11.5" fill="#5a6b5d">✓ Reading CLAUDE.md</text>
  <text x="84" y="168" font-family="monospace" font-size="11.5" fill="#5a6b5d">✓ Loaded project context</text>

  <!-- Blank line + next prompt -->
  <text x="84" y="198" font-family="monospace" font-size="13" fill="#c8a96e">›</text>
  <text x="100" y="198" font-family="monospace" font-size="11.5" fill="#ddd8ce"> Analyze stage 02_cleaning/</text>

  <text x="84" y="222" font-family="monospace" font-size="11.5" fill="#5a6b5d">✓ Reading 3 files...</text>
  <text x="84" y="242" font-family="monospace" font-size="11.5" fill="#5a6b5d">✓ Running clean.R</text>
  <text x="84" y="262" font-family="monospace" font-size="11.5" fill="#5a6b5d">✓ Output written to output/</text>
  <text x="84" y="282" font-family="monospace" font-size="11.5" fill="#5a6b5d">✓ Committed to dev branch</text>

  <!-- Next prompt with blinking cursor -->
  <text x="84" y="312" font-family="monospace" font-size="13" fill="#b85c38">$</text>
  <rect x="98" y="299" width="8" height="16" fill="#faf7f2" opacity="0.8"/>

  <!-- Right side: workflow nodes -->
  <!-- Node: GitHub -->
  <rect x="540" y="70" width="190" height="72" rx="3" fill="white" stroke="#ddd8ce" stroke-width="1"/>
  <rect x="540" y="70" width="5" height="72" rx="0" fill="#5a6b5d"/>
  <text x="562" y="102" font-family="Georgia, serif" font-size="13" fill="#1a1714" font-weight="400">GitHub</text>
  <text x="562" y="122" font-family="monospace" font-size="10" fill="#8a8078" letter-spacing="0.5">Code · Branches · PRs</text>

  <!-- Arrow down -->
  <line x1="635" y1="142" x2="635" y2="178" stroke="#ddd8ce" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="629,176 635,186 641,176" fill="#ddd8ce"/>

  <!-- Node: Claude Code -->
  <rect x="540" y="188" width="190" height="72" rx="3" fill="white" stroke="#b85c38" stroke-width="1.5"/>
  <rect x="540" y="188" width="5" height="72" rx="0" fill="#b85c38"/>
  <text x="562" y="220" font-family="Georgia, serif" font-size="13" fill="#1a1714" font-weight="400">Claude Code</text>
  <text x="562" y="240" font-family="monospace" font-size="10" fill="#8a8078" letter-spacing="0.5">Terminal · Autonomous</text>

  <!-- Arrow down -->
  <line x1="635" y1="260" x2="635" y2="296" stroke="#ddd8ce" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="629,294 635,304 641,294" fill="#ddd8ce"/>

  <!-- Node: Supabase -->
  <rect x="540" y="306" width="190" height="72" rx="3" fill="white" stroke="#ddd8ce" stroke-width="1"/>
  <rect x="540" y="306" width="5" height="72" rx="0" fill="#c8a96e"/>
  <text x="562" y="338" font-family="Georgia, serif" font-size="13" fill="#1a1714" font-weight="400">Supabase</text>
  <text x="562" y="358" font-family="monospace" font-size="10" fill="#8a8078" letter-spacing="0.5">Data · Storage · DVC</text>

  <!-- Connector: terminal to workflow -->
  <line x1="480" y1="230" x2="538" y2="224" stroke="#ddd8ce" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom text -->
  <text x="60" y="440" font-family="Georgia, serif" font-size="22" fill="#1a1714" font-weight="400" font-style="italic">Hello Claude Code</text>
  <text x="60" y="466" font-family="monospace" font-size="11" fill="#8a8078" letter-spacing="2">A GUIDE FOR RESEARCHERS</text>

  <!-- Decorative rule -->
  <line x1="60" y1="478" x2="380" y2="478" stroke="#ddd8ce" stroke-width="1"/>
  <line x1="60" y1="478" x2="120" y2="478" stroke="#b85c38" stroke-width="1.5"/>
</svg>
